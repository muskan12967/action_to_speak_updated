name: Build Flutter APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'

      - name: Force correct speech_to_text version
        run: |
          rm -f pubspec.lock
          sed -i '/speech_to_text/d' pubspec.yaml
          sed -i '/flutter_tts/a\  speech_to_text: 6.3.0' pubspec.yaml
          grep speech_to_text pubspec.yaml

      - name: Get packages
        run: flutter pub get

      - name: Regenerate Android folder
        run: |
          rm -rf android/
          flutter create --platforms=android .

      - name: Fix build.gradle.kts using Python
        run: |
          python3 << 'PYEOF'
          import re

          path = "android/app/build.gradle.kts"
          with open(path, "r") as f:
              content = f.read()

          print("=== BEFORE ===")
          print(content)

          # Replace minSdk = flutter.minSdkVersion  →  minSdk = 24
          content = re.sub(r'minSdk\s*=\s*flutter\.minSdkVersion', 'minSdk = 24', content)
          # Replace targetSdk = flutter.targetSdkVersion  →  targetSdk = 34
          content = re.sub(r'targetSdk\s*=\s*flutter\.targetSdkVersion', 'targetSdk = 34', content)
          # Replace compileSdk = flutter.compileSdkVersion  →  compileSdk = 34
          content = re.sub(r'compileSdk\s*=\s*flutter\.compileSdkVersion', 'compileSdk = 34', content)
          # Replace any plain numbers too just in case
          content = re.sub(r'minSdk\s*=\s*\d+', 'minSdk = 24', content)
          content = re.sub(r'targetSdk\s*=\s*\d+', 'targetSdk = 34', content)

          print("=== AFTER ===")
          print(content)

          with open(path, "w") as f:
              f.write(content)

          print("Done!")
          PYEOF

      - name: Add permissions to AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's|<application|<uses-permission android:name="android.permission.CAMERA"/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <uses-permission android:name="android.permission.INTERNET"/>\n    <application|g' "$MANIFEST"
          echo "--- Permissions added ---"
          grep "uses-permission" "$MANIFEST"

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
