name: Build Flutter APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'

      - name: Force correct speech_to_text version
        run: |
          rm -f pubspec.lock
          sed -i '/speech_to_text/d' pubspec.yaml
          sed -i '/flutter_tts/a\  speech_to_text: 6.3.0' pubspec.yaml
          echo "--- speech_to_text in pubspec.yaml ---"
          grep speech_to_text pubspec.yaml

      - name: Get packages
        run: flutter pub get

      - name: Regenerate Android folder
        run: |
          rm -rf android/
          flutter create --platforms=android .
          echo "--- All gradle files ---"
          find . -name "*.gradle" -o -name "*.gradle.kts" | grep -v ".dart_tool"

      - name: Fix minSdkVersion
        run: |
          # Flutter 3.41.9 generates build.gradle.kts (Kotlin DSL)
          BUILD_GRADLE="android/app/build.gradle.kts"
          
          if [ ! -f "$BUILD_GRADLE" ]; then
            # fallback to groovy DSL
            BUILD_GRADLE="android/app/build.gradle"
          fi
          
          echo "Using: $BUILD_GRADLE"
          echo "--- Before fix ---"
          cat "$BUILD_GRADLE"
          
          # Fix minSdk — Kotlin DSL uses minSdk not minSdkVersion
          sed -i 's/minSdk = flutter\.minSdkVersion/minSdk = 24/g' "$BUILD_GRADLE"
          sed -i 's/minSdk = [0-9]*/minSdk = 24/g' "$BUILD_GRADLE"
          sed -i 's/minSdkVersion flutter\.minSdkVersion/minSdkVersion 24/g' "$BUILD_GRADLE"
          sed -i 's/minSdkVersion [0-9]*/minSdkVersion 24/g' "$BUILD_GRADLE"
          sed -i 's/targetSdk = [0-9]*/targetSdk = 34/g' "$BUILD_GRADLE"
          sed -i 's/targetSdkVersion [0-9]*/targetSdkVersion 34/g' "$BUILD_GRADLE"
          
          echo "--- After fix ---"
          grep -E "minSdk|targetSdk|compileSdk" "$BUILD_GRADLE"

      - name: Add camera and mic permissions to AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # Insert permissions before <application tag
          sed -i 's|<application|<uses-permission android:name="android.permission.CAMERA"/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <uses-permission android:name="android.permission.INTERNET"/>\n    <application|g' "$MANIFEST"
          echo "--- AndroidManifest.xml ---"
          cat "$MANIFEST"

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
