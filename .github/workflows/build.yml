name: Build Flutter APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'

      - name: Force correct speech_to_text version
        run: |
          rm -f pubspec.lock
          sed -i '/speech_to_text/d' pubspec.yaml
          sed -i '/flutter_tts/a\  speech_to_text: 6.3.0' pubspec.yaml
          echo "--- speech_to_text in pubspec.yaml ---"
          grep speech_to_text pubspec.yaml

      - name: Get packages
        run: flutter pub get

      - name: Setup Android directory
        run: |
          # Remove any broken android folder and regenerate cleanly
          rm -rf android/
          flutter create --platforms=android .
          echo "--- Gradle files found ---"
          find . -name "*.gradle" | grep -v ".dart_tool"

      - name: Fix Android build settings
        run: |
          # Find build.gradle wherever it is
          BUILD_GRADLE=$(find android/ -name "build.gradle" | grep "app/build.gradle" | head -1)
          
          if [ -z "$BUILD_GRADLE" ]; then
            # Try kotlin dsl
            BUILD_GRADLE=$(find android/ -name "build.gradle.kts" | grep "app" | head -1)
          fi
          
          echo "Found: $BUILD_GRADLE"
          
          if [ -n "$BUILD_GRADLE" ]; then
            sed -i 's/minSdkVersion flutter\.minSdkVersion/minSdkVersion 24/g' "$BUILD_GRADLE"
            sed -i 's/minSdkVersion [0-9]*/minSdkVersion 24/g' "$BUILD_GRADLE"
            sed -i 's/targetSdkVersion [0-9]*/targetSdkVersion 34/g' "$BUILD_GRADLE"
            echo "--- SDK versions ---"
            grep -E "minSdk|targetSdk|compileSdk" "$BUILD_GRADLE"
          else
            echo "--- All gradle files ---"
            find android/ -name "*.gradle*"
            echo "--- android/app/ contents ---"
            ls -la android/app/ 2>/dev/null || echo "android/app/ missing"
            exit 1
          fi

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
