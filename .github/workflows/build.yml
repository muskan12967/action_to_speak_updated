name: Build Flutter APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'

      - name: Show repo contents
        run: |
          echo "=== assets/ ===" && ls -lh assets/
          echo "=== model.tflite ===" && ls -lh assets/model.tflite
          echo "=== pubspec.yaml ===" && cat pubspec.yaml

      - name: Fix pubspec and assets
        run: |
          # Fix speech_to_text version
          sed -i 's/speech_to_text:.*/speech_to_text: ^7.0.0/' pubspec.yaml

          # Remove old assets block
          python3 -c "
import re
with open('pubspec.yaml') as f:
    c = f.read()
c = re.sub(r'\n  assets:[\s\S]*?(?=\n\w|\Z)', '', c)
marker = '  uses-material-design: true'
block = marker + '\n  assets:\n    - assets/model.tflite\n    - assets/videos/book.mp4\n    - assets/videos/friend.mp4\n    - assets/videos/father.mp4\n    - assets/videos/family.mp4\n    - assets/videos/student.mp4\n    - assets/videos/write.mp4\n    - assets/videos/mother.mp4\n    - assets/videos/read.mp4\n    - assets/videos/home.mp4'
c = c.replace(marker, block)
with open('pubspec.yaml', 'w') as f:
    f.write(c)
print('pubspec fixed')
"
          echo "=== pubspec flutter section ===" && grep -A 20 "^flutter:" pubspec.yaml
          rm -f pubspec.lock

      - name: Get packages
        run: flutter pub get

      - name: Setup Android folder
        run: |
          if [ ! -f "android/app/build.gradle" ] && [ ! -f "android/app/build.gradle.kts" ]; then
            echo "Regenerating android folder..."
            cp pubspec.yaml /tmp/pubspec_bak.yaml
            cp -r assets /tmp/assets_bak
            rm -rf android/
            flutter create --platforms=android .
            cp /tmp/pubspec_bak.yaml pubspec.yaml
            cp -r /tmp/assets_bak/. assets/
            flutter pub get
          else
            echo "Android folder exists, skipping flutter create"
          fi

      - name: Fix build.gradle SDK versions
        run: |
          python3 -c "
import re, os
p = 'android/app/build.gradle.kts' if os.path.exists('android/app/build.gradle.kts') else 'android/app/build.gradle'
print('Fixing: ' + p)
c = open(p).read()
c = re.sub(r'minSdk\s*=\s*\S+', 'minSdk = 24', c)
c = re.sub(r'minSdkVersion\s+\S+', 'minSdkVersion 24', c)
c = re.sub(r'targetSdk\s*=\s*\S+', 'targetSdk = 36', c)
c = re.sub(r'targetSdkVersion\s+\S+', 'targetSdkVersion 36', c)
c = re.sub(r'compileSdk\s*=\s*\S+', 'compileSdk = 36', c)
open(p, 'w').write(c)
print(c)
"

      - name: Add permissions to AndroidManifest
        run: |
          M="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "CAMERA" "$M"; then
            sed -i 's|<application|<uses-permission android:name="android.permission.CAMERA"/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <uses-permission android:name="android.permission.INTERNET"/>\n    <application|g' "$M"
          fi
          grep "uses-permission" "$M"

      - name: Final verify
        run: |
          echo "=== model.tflite ===" && ls -lh assets/model.tflite
          echo "=== assets in pubspec ===" && grep -A 15 "assets:" pubspec.yaml
          echo "=== all assets ===" && find assets/ -type f | sort

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
