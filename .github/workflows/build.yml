name: Build Flutter APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'

      - name: Show repo contents
        run: |
          echo "=== assets/ ===" && ls -lh assets/
          echo "=== model.tflite ===" && ls -lh assets/model.tflite
          echo "=== pubspec.yaml ===" && cat pubspec.yaml

      - name: Fix pubspec.yaml
        run: |
          sed -i 's/speech_to_text:.*/speech_to_text: ^7.0.0/' pubspec.yaml
          sed -i 's/tflite_flutter:.*/tflite_flutter: ^0.12.0/' pubspec.yaml
          grep -v "^\s*-\s*assets/" pubspec.yaml | grep -v "^\s*assets:" > /tmp/pubspec_clean.yaml
          cat /tmp/pubspec_clean.yaml > pubspec.yaml
          sed -i 's/uses-material-design: true/uses-material-design: true\n  assets:\n    - assets\/model.tflite\n    - assets\/videos\/book.mp4\n    - assets\/videos\/friend.mp4\n    - assets\/videos\/father.mp4\n    - assets\/videos\/family.mp4\n    - assets\/videos\/student.mp4\n    - assets\/videos\/write.mp4\n    - assets\/videos\/mother.mp4\n    - assets\/videos\/read.mp4\n    - assets\/videos\/home.mp4/' pubspec.yaml
          echo "=== pubspec after fix ===" && cat pubspec.yaml
          rm -f pubspec.lock

      - name: Get packages
        run: flutter pub get

      - name: Setup Android folder
        run: |
          if [ ! -f "android/app/build.gradle" ] && [ ! -f "android/app/build.gradle.kts" ]; then
            echo "Regenerating android folder..."
            cp pubspec.yaml /tmp/pubspec_bak.yaml
            cp -r assets /tmp/assets_bak
            rm -rf android/
            flutter create --platforms=android .
            cp /tmp/pubspec_bak.yaml pubspec.yaml
            cp -r /tmp/assets_bak/. assets/
            flutter pub get
          else
            echo "Android folder exists, skipping flutter create"
          fi

      - name: Fix build.gradle SDK versions
        run: |
          if [ -f "android/app/build.gradle.kts" ]; then
            GRADLE="android/app/build.gradle.kts"
          else
            GRADLE="android/app/build.gradle"
          fi
          echo "Fixing $GRADLE"
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 24/' "$GRADLE"
          sed -i 's/minSdk = [0-9]*/minSdk = 24/' "$GRADLE"
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 24/' "$GRADLE"
          sed -i 's/minSdkVersion [0-9]*/minSdkVersion 24/' "$GRADLE"
          sed -i 's/targetSdk = flutter.targetSdkVersion/targetSdk = 36/' "$GRADLE"
          sed -i 's/targetSdk = [0-9]*/targetSdk = 36/' "$GRADLE"
          sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 36/' "$GRADLE"
          sed -i 's/compileSdk = [0-9]*/compileSdk = 36/' "$GRADLE"
          echo "=== gradle after fix ===" && cat "$GRADLE"

      - name: Add permissions to AndroidManifest
        run: |
          M="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "CAMERA" "$M"; then
            sed -i 's|<application|<uses-permission android:name="android.permission.CAMERA"/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <uses-permission android:name="android.permission.INTERNET"/>\n    <application|g' "$M"
          fi
          grep "uses-permission" "$M"

      - name: Final verify
        run: |
          echo "=== model.tflite ===" && ls -lh assets/model.tflite
          echo "=== assets in pubspec ===" && grep -A 15 "assets:" pubspec.yaml
          echo "=== all assets ===" && find assets/ -type f | sort

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
