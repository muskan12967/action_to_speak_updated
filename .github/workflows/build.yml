name: Build Flutter APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'

      - name: Create Android project files
        run: flutter create --platforms=android .

      - name: Force correct speech_to_text version
        run: |
          # Delete lock file so Flutter resolves versions fresh from pubspec.yaml
          rm -f pubspec.lock
          # Force exact version — remove any existing speech_to_text line and replace
          sed -i '/speech_to_text/d' pubspec.yaml
          sed -i '/flutter_tts/a\  speech_to_text: 6.3.0' pubspec.yaml
          echo "--- speech_to_text in pubspec.yaml ---"
          grep speech_to_text pubspec.yaml

      - name: Get packages
        run: flutter pub get

      - name: Verify speech_to_text version
        run: |
          echo "--- Resolved version in pubspec.lock ---"
          grep -A2 "speech_to_text" pubspec.lock

      - name: Fix Android build settings
        run: |
          if [ -f "android/app/build.gradle" ]; then
            # hand_landmarker requires minSdkVersion 24, NOT 21
            sed -i 's/minSdkVersion .*/minSdkVersion 24/g' android/app/build.gradle
            sed -i 's/targetSdkVersion .*/targetSdkVersion 34/g' android/app/build.gradle
            echo "--- build.gradle after fix ---"
            grep -E "minSdkVersion|targetSdkVersion" android/app/build.gradle
          else
            echo "build.gradle not found"
            exit 1
          fi

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
