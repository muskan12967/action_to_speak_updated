name: Build Flutter APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'

      - name: Fix dependencies
        run: |
          rm -f pubspec.lock
          sed -i '/speech_to_text/d' pubspec.yaml
          sed -i '/flutter_tts/a\  speech_to_text: ^7.0.0' pubspec.yaml
          echo "--- Updated pubspec dependencies ---"
          grep -E "speech_to_text|hand_landmarker|camera|flutter_tts" pubspec.yaml

      - name: Get packages
        run: flutter pub get

      - name: Regenerate Android folder
        run: |
          rm -rf android/
          flutter create --platforms=android .

      - name: Restore assets in pubspec.yaml
        run: |
          python3 << 'PYEOF'
          with open("pubspec.yaml", "r") as f:
              content = f.read()

          assets_block = """\n  assets:\n    - assets/model.tflite\n    - assets/videos/book.mp4\n    - assets/videos/friend.mp4\n    - assets/videos/father.mp4\n    - assets/videos/family.mp4\n    - assets/videos/student.mp4\n    - assets/videos/write.mp4\n    - assets/videos/mother.mp4\n    - assets/videos/read.mp4\n    - assets/videos/home.mp4\n"""

          if "assets/model.tflite" not in content:
              content = content.replace(
                  "  uses-material-design: true",
                  "  uses-material-design: true" + assets_block
              )
              print("Assets block added")
          else:
              print("Assets already present")

          with open("pubspec.yaml", "w") as f:
              f.write(content)

          # Verify
          with open("pubspec.yaml", "r") as f:
              print(f.read())
          PYEOF

      - name: Fix SDK versions in build.gradle.kts
        run: |
          python3 << 'PYEOF'
          import re

          path = "android/app/build.gradle.kts"
          with open(path, "r") as f:
              content = f.read()

          print("=== BEFORE ===")
          print(content)

          content = re.sub(r'minSdk\s*=\s*flutter\.minSdkVersion', 'minSdk = 24', content)
          content = re.sub(r'minSdk\s*=\s*\d+', 'minSdk = 24', content)
          content = re.sub(r'targetSdk\s*=\s*flutter\.targetSdkVersion', 'targetSdk = 36', content)
          content = re.sub(r'targetSdk\s*=\s*\d+', 'targetSdk = 36', content)
          content = re.sub(r'compileSdk\s*=\s*flutter\.compileSdkVersion', 'compileSdk = 36', content)
          content = re.sub(r'compileSdk\s*=\s*\d+', 'compileSdk = 36', content)

          print("=== AFTER ===")
          print(content)

          with open(path, "w") as f:
              f.write(content)

          print("Done!")
          PYEOF

      - name: Add permissions to AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's|<application|<uses-permission android:name="android.permission.CAMERA"/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <uses-permission android:name="android.permission.INTERNET"/>\n    <application|g' "$MANIFEST"
          echo "--- Permissions ---"
          grep "uses-permission" "$MANIFEST"

      - name: Verify assets exist
        run: |
          echo "--- Checking assets ---"
          ls -la assets/
          ls -la assets/videos/
          echo "--- pubspec assets section ---"
          grep -A 15 "assets:" pubspec.yaml

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
