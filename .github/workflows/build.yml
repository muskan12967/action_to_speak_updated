name: Build Flutter APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'

      - name: Verify model.tflite in repo
        run: |
          echo "=== Checking assets folder ==="
          ls -lh assets/ || echo "assets/ folder missing!"
          echo "=== model.tflite ==="
          stat assets/model.tflite && echo "✅ model.tflite exists" || echo "❌ model.tflite MISSING from repo!"
          echo "=== Videos ==="
          ls assets/videos/ || echo "videos/ missing"

      - name: Fix pubspec.yaml
        run: |
          python3 << 'PYEOF'
          import re

          with open("pubspec.yaml", "r") as f:
              content = f.read()

          # Fix speech_to_text version
          content = re.sub(r'speech_to_text:.*', 'speech_to_text: ^7.0.0', content)

          # Ensure assets block has model.tflite
          assets_block = "\n  assets:\n    - assets/model.tflite\n    - assets/videos/book.mp4\n    - assets/videos/friend.mp4\n    - assets/videos/father.mp4\n    - assets/videos/family.mp4\n    - assets/videos/student.mp4\n    - assets/videos/write.mp4\n    - assets/videos/mother.mp4\n    - assets/videos/read.mp4\n    - assets/videos/home.mp4\n"

          if "assets/model.tflite" not in content:
              content = content.replace(
                  "  uses-material-design: true",
                  "  uses-material-design: true" + assets_block
              )
              print("✅ Assets block added")
          else:
              print("✅ Assets already in pubspec")

          with open("pubspec.yaml", "w") as f:
              f.write(content)

          # Show flutter section
          idx = content.find("flutter:")
          print("=== flutter section ===")
          print(content[idx:idx+600])
          PYEOF

      - name: Remove lock file
        run: rm -f pubspec.lock

      - name: Get packages
        run: flutter pub get

      - name: Save pubspec.yaml before flutter create destroys it
        run: cp pubspec.yaml pubspec.yaml.backup

      - name: Regenerate Android folder
        run: |
          rm -rf android/
          flutter create --platforms=android .

      - name: Restore pubspec.yaml after flutter create
        run: |
          # flutter create overwrites pubspec.yaml — restore our version
          cp pubspec.yaml.backup pubspec.yaml
          echo "=== Restored pubspec.yaml ==="
          grep -A 15 "flutter:" pubspec.yaml

      - name: Get packages again with restored pubspec
        run: flutter pub get

      - name: Fix SDK versions in build.gradle.kts
        run: |
          python3 << 'PYEOF'
          import re
          path = "android/app/build.gradle.kts"
          with open(path, "r") as f:
              content = f.read()
          content = re.sub(r'minSdk\s*=\s*flutter\.minSdkVersion', 'minSdk = 24', content)
          content = re.sub(r'minSdk\s*=\s*\d+', 'minSdk = 24', content)
          content = re.sub(r'targetSdk\s*=\s*flutter\.targetSdkVersion', 'targetSdk = 36', content)
          content = re.sub(r'targetSdk\s*=\s*\d+', 'targetSdk = 36', content)
          content = re.sub(r'compileSdk\s*=\s*flutter\.compileSdkVersion', 'compileSdk = 36', content)
          content = re.sub(r'compileSdk\s*=\s*\d+', 'compileSdk = 36', content)
          with open(path, "w") as f:
              f.write(content)
          print("=== build.gradle.kts ===")
          print(content)
          PYEOF

      - name: Add permissions to AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's|<application|<uses-permission android:name="android.permission.CAMERA"/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <uses-permission android:name="android.permission.INTERNET"/>\n    <application|g' "$MANIFEST"
          grep "uses-permission" "$MANIFEST"

      - name: Final check before build
        run: |
          echo "=== model.tflite ==="
          stat assets/model.tflite
          echo "=== pubspec assets ==="
          grep -A 15 "assets:" pubspec.yaml
          echo "=== All assets ==="
          find assets/ -type f | sort

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
