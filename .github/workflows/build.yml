name: Build Flutter APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'

      - name: Create Android project files
        run: flutter create --platforms=android .

      - name: Get packages
        run: flutter pub get

      - name: Fix minSdkVersion
        run: |
          if [ -f "android/app/build.gradle" ]; then
            sed -i 's/minSdkVersion .*/minSdkVersion 21/g' android/app/build.gradle
            sed -i 's/targetSdkVersion .*/targetSdkVersion 34/g' android/app/build.gradle
            echo "✅ Fixed build.gradle"
          else
            echo "⚠️ build.gradle not found, creating default"
          fi

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
