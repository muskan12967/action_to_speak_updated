name: Build Flutter APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'

      - name: Force correct speech_to_text version
        run: |
          rm -f pubspec.lock
          sed -i '/speech_to_text/d' pubspec.yaml
          sed -i '/flutter_tts/a\  speech_to_text: 6.3.0' pubspec.yaml
          echo "--- speech_to_text in pubspec.yaml ---"
          grep speech_to_text pubspec.yaml

      - name: Get packages
        run: flutter pub get

      - name: Create Android project files
        run: |
          flutter create --platforms=android .
          echo "--- Listing android/app/ ---"
          ls android/app/

      - name: Fix Android build settings
        run: |
          BUILD_GRADLE="android/app/build.gradle"
          if [ -f "$BUILD_GRADLE" ]; then
            sed -i 's/minSdkVersion .*/minSdkVersion 24/g' "$BUILD_GRADLE"
            sed -i 's/targetSdkVersion .*/targetSdkVersion 34/g' "$BUILD_GRADLE"
            # Also handle flutter.minSdkVersion style
            sed -i 's/minSdkVersion flutter\.minSdkVersion/minSdkVersion 24/g' "$BUILD_GRADLE"
            echo "--- SDK versions in build.gradle ---"
            grep -E "minSdkVersion|targetSdkVersion|compileSdkVersion" "$BUILD_GRADLE"
          else
            echo "build.gradle still not found after flutter create"
            echo "--- Contents of android/ ---"
            find android/ -name "*.gradle" 2>/dev/null || echo "No gradle files found"
            exit 1
          fi

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
