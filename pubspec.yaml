name: action_to_speak_updated
description: "AI based sign recognition"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  permission_handler: ^11.3.0
  lottie: ^3.0.0
  video_player: ^2.8.2
  chewie: ^1.7.5
  camera: ^0.11.4
  flutter_tts: ^3.8.5
  speech_to_text: ^7.0.0
  tflite_flutter: ^0.12.1
  hand_landmarker: ^2.2.0
  image: ^4.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/model.tflite
    - assets/labels.json
    - assets/logo.png
    - assets/videos/book.mp4
    - assets/videos/friend.mp4
    - assets/videos/father.mp4
    - assets/videos/family.mp4
    - assets/videos/student.mp4
    - assets/videos/write.mp4
    - assets/videos/mother.mp4
    - assets/videos/read.mp4
    - assets/videos/home.mp4
